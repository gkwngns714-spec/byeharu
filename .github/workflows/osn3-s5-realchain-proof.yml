name: OSN-3 S5 — real-migration-chain proof (disposable Supabase)

# Authoritative/gating S5 proof for the coordinate-complete trusted destruction primitive
# dev_set_main_ship_destroyed. Boots a DISPOSABLE local Supabase stack via the CLI, applying the ACTUAL
# chain 0001..0059 — real tables/CHECKs/indexes/RLS/grants/triggers/pg_cron and the real roles anon/
# authenticated/service_role. NOT a stub; NEVER the shared/live DB. Proves the primitive's permission
# boundary, the coherent-destruction matrix (in_transit/in_space/at_location/legacy), idempotency,
# real repair_main_ship-after-destruction, the contradiction-abort matrix, real concurrent-session race
# behavior, REST/RPC denial, the unchanged S4 cron, and restores the simulated activated config. Runs
# on push to the OSN-3 branch(es).

on:
  push:
    branches:
      - 'osn3-**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start disposable local Supabase (applies migrations 0001..0059)
        run: supabase start

      - name: Export local stack connection env (keys masked)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^(API_URL|DB_URL)=' /tmp/sbenv || true

      - name: Destruction-primitive permission/boundary proof (real chain)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn3-s5-realchain-perm.sql

      - name: Runtime SET ROLE EXECUTE denial + service_role success (destruction primitive)
        run: |
          set -a; . /tmp/sbenv; set +a
          for r in anon authenticated; do
            out=$(psql "$DB_URL" -X -c "set role $r; select public.dev_set_main_ship_destroyed('00000000-0000-0000-0000-000000000000');" 2>&1 || true)
            echo "$out" | grep -qi "permission denied" && echo "ok: $r cannot EXECUTE the destruction primitive" || { echo "FAIL: $r executed it -> $out"; exit 1; }
          done
          out=$(psql "$DB_URL" -X -c "set role service_role; select public.dev_set_main_ship_destroyed('00000000-0000-0000-0000-000000000000');" 2>&1 || true)
          echo "$out" | grep -qi "no main ship" && echo "ok: service_role can EXECUTE (returned the expected no-ship business error)" || { echo "FAIL: service_role -> $out"; exit 1; }

      - name: Destruction fixture matrix (coherent + idempotency + repair + contradiction abort)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn3-s5-realchain-fixtures.sql

      - name: Dynamic concurrency proof (real concurrent sessions)
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn3-s5-realchain-concurrency.sh

      - name: Local REST/RPC permission proof (anon + authenticated JWT)
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn3-s5-realchain-rest.sh

      - name: Restore simulated activated config + S4 cron + cleanup fixtures (always)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -c "update game_config set value='true'  where key='mainship_send_enabled';" || true
            psql "$DB_URL" -X -c "update game_config set value='false' where key='mainship_space_movement_enabled';" || true
            psql "$DB_URL" -X -c "update game_config set value='86400' where key='max_coordinate_travel_seconds';" || true
            psql "$DB_URL" -X -c "delete from auth.users where email like 'osn3s5fix.%@example.com' or email like 'osn3s5lock.%@example.com' or email like 'osn3s5rest.%@example.com';" || true
            psql "$DB_URL" -X -c "do \$\$ begin perform cron.unschedule(jobid) from cron.job where jobname='process-mainship-space-arrivals'; exception when undefined_table then null; end \$\$; select cron.schedule('process-mainship-space-arrivals','30 seconds',\$cmd\$select public.process_mainship_space_arrivals();\$cmd\$);" || true
          fi

      - name: Assert flags/cap + no fixtures + S4 cron present (always)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -v ON_ERROR_STOP=1 -X -c "do \$\$ declare a text; b text; c text; n int; jn int;
            begin
              select value::text into a from game_config where key='mainship_send_enabled';
              select value::text into b from game_config where key='mainship_space_movement_enabled';
              select value::text into c from game_config where key='max_coordinate_travel_seconds';
              if a is distinct from 'true'  then raise exception 'send flag=%', a; end if;
              if b is distinct from 'false' then raise exception 'space flag=%', b; end if;
              if c is distinct from '86400' then raise exception 'cap=%', c; end if;
              select count(*) into n from auth.users where email like 'osn3s5%@example.com'; if n<>0 then raise exception '% fixture users remain', n; end if;
              if exists (select 1 from main_ship_space_movements) then raise exception 'coordinate movements remain'; end if;
              if exists (select 1 from main_ship_space_command_receipts) then raise exception 'command receipts remain'; end if;
              select count(*) into jn from cron.job where jobname='process-mainship-space-arrivals'; if jn<>1 then raise exception 'arrival cron jobs=%', jn; end if;
              raise notice 'post-run ok: send=true space=false cap=86400 no-fixtures s4-cron-present-once';
            end \$\$;"
          fi

      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
