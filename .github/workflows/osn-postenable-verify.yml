name: OSN post-enable verify (PRODUCTION — gated, read-only)

# Manually-dispatched, production-Environment-gated, STRICTLY READ-ONLY verification that production matches
# the approved CURRENT state (head 0070 / OSN-COORD-GATE-1): OSN port-to-port ENABLED
# (mainship_space_movement_enabled=true); FREE coordinate travel still gated OFF — the live
# mainship_coordinate_travel_enabled value is READ FROM THE DB (not inferred) with a fail-closed integrity
# guard, and must be false; the arbitrary-coordinate command surface (command_main_ship_space_move) is the
# only public raw-coordinate entry point, authenticated-only, with its raw writers service-role-only; ports
# active; ACL + exclusivity structure intact. It NEVER writes, never issues a movement command, never
# enables/disables a flag, never creates a player. workflow_dispatch ONLY; runs only from main; a DB-free
# static self-test gates the production job. Dispatch is a separate, explicitly-authorized read-only step.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osn-postenable-verify-production
  cancel-in-progress: false

jobs:
  static_safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: DB-free static safety self-test (no secrets, no DB)
        run: bash scripts/osn-postenable-verify.sh selftest

  postenable_verify:
    needs: static_safety
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Refuse any ref other than main
        run: |
          set +x
          [ "$GITHUB_REF" = "refs/heads/main" ] || { echo "BLOCKED: runs only from refs/heads/main (got $GITHUB_REF)"; exit 1; }
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Read-only post-enable production verification (pinned-CA verify-full session pooler)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +x
          bash scripts/osn-postenable-verify.sh production
