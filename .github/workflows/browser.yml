name: Browser acceptance (M4.5)

# Playwright acceptance test for the M4.5 production-queue UI, run against the live
# Pages site. Test infrastructure only. @playwright/test is installed ad-hoc with
# --no-save so package-lock.json stays in sync (other workflows' `npm ci` keep working).

on:
  workflow_dispatch:

permissions:
  contents: read

# Serialize with the verify + galaxy-browser suites so the shared DB is never mutated/
# cleaned by two runs at once.
concurrency:
  group: live-db-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app deps (for @supabase/supabase-js in the test setup)
        run: npm ci

      - name: Install Playwright (ad-hoc, no lockfile change)
        run: |
          npm install --no-save @playwright/test@latest
          npx playwright install --with-deps chromium

      - name: Run M4.5 browser acceptance
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PLAYWRIGHT_BASE_URL: https://gkwngns714-spec.github.io/byeharu/
        run: npm run verify:m45:browser

      # Self-cleaning: remove this run's throwaway runtime rows. Scoped to %m45testbrowser%
      # so it can never touch verify (m45test.TAG / m*test / p*test) or galaxy (galaxytest*)
      # users. Runs even on failure.
      - name: Clean up M4.5 browser test runtime rows (always)
        if: always()
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/verify-cleanup.mjs --confirm --pattern '%m45testbrowser%@example.com'

      - name: Upload screenshots + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-m45
          path: |
            playwright-report/
            test-results/
          retention-days: 14
