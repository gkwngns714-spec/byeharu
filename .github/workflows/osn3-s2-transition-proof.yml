name: OSN-3 S2 — transition-core proof (SUPPLEMENTARY, stub-schema, NON-GATING)

# SUPPLEMENTARY / NON-GATING coverage only — NOT the authoritative S2 proof. This runs the four helper
# bodies against a RECREATED STUB schema on a bare postgres:15 container (it does NOT apply the actual
# migration chain and does NOT exercise the real S1 CHECKs/RLS/FK-actions/roles). The AUTHORITATIVE S2
# proof is `OSN-3 S2 — real-migration-chain proof (disposable Supabase)`, which applies migrations
# 0001..0056 and proves permissions/RPC/fixtures/lock-order against the real schema. This stub proof
# is retained only as fast dblink lock-conflict coverage; do not treat it as schema-faithful.

on:
  push:
    branches:
      - 'osn3-**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - name: Run disposable S2 transition-core proof
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 -f scripts/osn3-s2-transition-core-proof.sql
