name: Verify — main-ship send (10C)

# Standalone check for the Phase 10C main-ship WRITE path (non-combat, flag-gated). It flips
# the feature flag on via service-role, runs a throwaway round trip, and restores all config
# it touched. Shares the live-DB concurrency group so it never races other live-DB workflows.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-db-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run main-ship send verification
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run verify:mainship-send
