name: Reveal starter ports — disposable proof (no production)

# Proves the PORT-LAUNCH-2C reveal-operation tooling WITHOUT any production access whatsoever:
#   1. a DB-free static self-test of the operation script (confirmation gate, main-only ref guard, the
#      operation SQL's shape, the pinned-CA verify-full session-pooler conn template, override rejection);
#   2. a disposable local Supabase (chain 0001..0068) operation matrix: the happy path plus every
#      fail-closed negative (wrong pre-state, rerun-after-success, flag tamper, unexpected-mutation
#      detectors) — none of which touches production, a real flag, or a real reveal;
#   3. a scope guard confirming this branch changes no migration or frontend/product files.
# No `environment:` on any job — none can read the protected production secrets. The gated production
# operation is the separate reveal-starter-ports.yml (dispatch-only, human-approved).

on:
  push:
    branches:
      - 'port-launch-2c-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reveal-starter-ports-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: DB-free static safety self-test
        run: bash scripts/reveal-starter-ports.sh selftest

  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Confirm PORT-LAUNCH-2C is operational-control only (no migration / frontend / product change)
        run: |
          set +x
          git fetch origin main 2>/dev/null || true
          base="$(git merge-base origin/main HEAD || echo origin/main)"
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files vs main:"; echo "$changed"
          if echo "$changed" | grep -qE '^supabase/migrations/|^src/'; then
            echo "FAIL: PORT-LAUNCH-2C must not change migrations or frontend source"; exit 1; fi
          echo "ok: no migration/frontend change — operational-control only"

  disposable-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies migrations 0001..0068)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: Operation matrix (happy path + fail-closed negatives) on the disposable stack
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/reveal-starter-ports.sh local
      - name: Assert the disposable stack ends at the dark baseline (3 ports hidden; OSN flag false)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -v ON_ERROR_STOP=1 -c "do \$\$ declare n int; begin
              select count(*) into n from public.locations where id in ('b1a00001-0066-4a00-8a00-000000000001','b1a00002-0066-4a00-8a00-000000000002','b1a00003-0066-4a00-8a00-000000000003') and status<>'hidden';
              if n<>0 then raise exception '% starter port(s) left non-hidden', n; end if;
              if (select value from public.game_config where key='mainship_space_movement_enabled') is distinct from 'false'::jsonb then raise exception 'OSN flag not false'; end if;
              raise notice 'post-run ok: 3 ports hidden; OSN flag false';
            end \$\$;"
          fi
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
