name: WORLD-EDITOR PUBLISH-ZONE-UNPUBLISH — zone unpublish twin disposable proof (no production)

# Proves migration 0255 (worldeditor_publish_zone_unpublish) on a THROWAWAY local Supabase — NEVER prod:
#   * `supabase start` applies the FULL migration chain incl. 0255. 0255's own in-migration self-assert
#     runs here against real Postgres (0243 spine + snapshot columns present, zone_unpublish SECURITY
#     DEFINER + authenticated-only, the zone_create twin intact, no client write grant on danger_zones
#     with SELECT intact, get_danger_zones intact, 0239 pirate-zone lockdown intact incl. the
#     service_role grant) — any regression ABORTS `supabase start` red.
#   * a self-rolling-back SQL proof then drives the WHOLE lifecycle end to end against the running
#     disposable DB: owner CREATE a marked canary (0254) → the canary is player-visible (get_danger_zones
#     while lit) AND interception-relevant (the exact status='active' AND ST_Intersects leaf predicate);
#     non-owner + anon unpublish REJECTED (not_authorized / not_authenticated + no execute grant) with
#     zero side effects; a seeded source='circle' zone REJECTED (not_unpublishable/protected_zone); a
#     vanished target not_found/source_missing; a drifted draft stale_revision/source_changed; owner
#     UNPUBLISH → the row is PRESERVED with status='inactive' and disappears from get_danger_zones AND
#     interception at once; exactly one create audit + one unpublish audit (before/after snapshots); an
#     idempotent replay adds no second audit; a NEW request on the inactive zone is
#     not_unpublishable/already_inactive; existing zones untouched; the danger_zones + 0239 lockdowns
#     intact.
# Read-only proof: self-rolling-back (begin;…rollback;), flips NO committed flag, keeps NO world row.
# NO `environment:` on any job ⇒ none can read production secrets. Modeled on
# worldeditor-publish-zone-create-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-worldeditor-zone-unpublish**'

permissions:
  contents: read

concurrency:
  group: worldeditor-publish-zone-unpublish-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0255 + its self-assert)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: WORLD-EDITOR PUBLISH-ZONE-UNPUBLISH real-chain proof (create canary / active-visible / rejections / protected / not-found+stale / unpublish / gone-from-reads / audit / idempotent / already-inactive / lockdown-intact)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldeditor-publish-zone-unpublish-proof.sql 2>&1)"
          echo "$out"
          for marker in \
            PUBLISH_ZONE_UNPUB_PASS_OWNER_CREATES_CANARY \
            PUBLISH_ZONE_UNPUB_PASS_ACTIVE_VISIBLE \
            PUBLISH_ZONE_UNPUB_PASS_NONOWNER_REJECTED \
            PUBLISH_ZONE_UNPUB_PASS_ANON_REJECTED \
            PUBLISH_ZONE_UNPUB_PASS_PROTECTED_ZONE_REJECTED \
            PUBLISH_ZONE_UNPUB_PASS_NOT_FOUND_AND_STALE \
            PUBLISH_ZONE_UNPUB_PASS_OWNER_UNPUBLISHES \
            PUBLISH_ZONE_UNPUB_PASS_GONE_FROM_READS \
            PUBLISH_ZONE_UNPUB_PASS_AUDIT \
            PUBLISH_ZONE_UNPUB_PASS_IDEMPOTENT \
            PUBLISH_ZONE_UNPUB_PASS_ALREADY_INACTIVE \
            PUBLISH_ZONE_UNPUB_PASS_EXISTING_UNCHANGED_AND_LOCKDOWN_INTACT \
            'WORLD-EDITOR PUBLISH-ZONE-UNPUBLISH PROOF PASSED'; do
            echo "$out" | grep -q "$marker" || { echo "MISSING PASS MARKER: $marker"; exit 1; }
          done
          echo 'ALL PUBLISH-ZONE-UNPUBLISH PASS MARKERS PRESENT'
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
