name: Deploy to GitHub Pages

# Hosts the byeharu frontend so it can be tested in a browser (local npm is
# unreliable on the dev machine). Builds with the VITE_ Supabase secrets baked in
# (anon key is public by design) and publishes to GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      # SPA deep-link fallback lives in public/404.html (rafgraph pattern) and is
      # copied verbatim into dist/ by Vite's publicDir, paired with the decode
      # snippet in index.html. No build-time cp step needed — public/404.html is
      # the single source of truth for the fallback.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
