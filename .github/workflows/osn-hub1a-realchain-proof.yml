name: OSN-HUB-1A — real-migration-chain proof (disposable Supabase)

# Authoritative current-chain proof for OSN-HUB-1A (canonical location-target navigation foundation). Boots a
# DISPOSABLE local Supabase stack via the CLI, applying the ACTUAL chain 0001..0067 — real tables / CHECKs /
# indexes / RLS / grants / triggers / pg_cron and the real roles anon/authenticated/service_role. NOT a stub;
# NEVER the shared/live DB. Proves: the full chain applies; the EXACT-16 authenticated RPC surface boundary
# (wrapper authenticated-only; core writer + target-legality predicate + every engine internal service_role-
# executable AND anon/authenticated-denied; no client access to space_anchors/location_services); the
# functional matrix (anchored origins, location-target success via the core AND the public wrapper, idempotency,
# the full DEPARTURE target-rejection matrix with no orphans, anchor-backed docking with FULL ARRIVAL
# revalidation under target-hierarchy locks — anchor/service/zone/sector/activity/location transitions during
# travel each terminally fail safely — leak-safety, flag-off anti-probe, pointer/single-engine coherence); OSN-4
# Stop COMPATIBILITY for location-target routes (mid-flight interpolated stop with no dock/presence; at/after
# arrival a location route settles through the same canonical Dock-0 decision — dock OR a settled safe terminal
# failure, never not_space_movement; flag-off recovery; idempotency); and a REAL concurrent-session race
# proving Stop vs the arrival processor on one due location route settles EXACTLY once (no duplicate dock/presence).
#
# THIS current-chain permission/boundary proof (scripts/osn-hub1a-realchain-perm.sql) is the AUTHORITATIVE
# 0067-chain ACL evidence and is exact/strong enough to REPLACE the skipped historical ACL assertions: §2
# asserts every OSN engine internal (begin_move / core / legality / resolve_origin / dock / processor / lock /
# validate / exclusion / settle / stop) is service_role-executable and anon/authenticated-denied over 0067, and
# §4 hard-fails on ANY surface drift (exact 16, no extras/missing/overloads).
#
# The historical per-slice proof scripts (osn3-s2..osn4 / dock0 perm, the enablement preflight) are ERA-SPECIFIC
# artifacts and are intentionally NOT re-executed here: they hard-pin a then-current migration head / flag state
# / exact client-RPC allowlist (e.g. osn3-s2 asserts mainship_send_enabled=false; dock0 pins an exact 15-RPC
# list; the preflight pins head=0064 + surface=15) that changed with 0065/0066 and this migration. A green run
# on their OWN osn3-**/worldhub* branch over their pinned chain is NOT current-chain evidence; re-pinning them
# (and the enablement preflight → head 0067 / surface 16) is ENABLEMENT-1 / per-slice maintenance, owner-gated
# and out of scope here. This workflow performs NO flag write and NO production access.

on:
  push:
    branches:
      - 'osn-hub-1a-**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start disposable local Supabase (applies migrations 0001..0067)
        run: supabase start

      - name: Export local stack connection env (keys masked)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^(API_URL|DB_URL)=' /tmp/sbenv || true

      - name: Permission / boundary proof (wrapper authenticated-only; engine service_role-only; no catalog leak)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn-hub1a-realchain-perm.sql

      - name: Runtime SET ROLE EXECUTE denial (core writer + dock primitive) + wrapper anon denial
        run: |
          set -a; . /tmp/sbenv; set +a
          ZERO='00000000-0000-0000-0000-000000000000'
          for r in anon authenticated; do
            out=$(psql "$DB_URL" -X -c "set role $r; select public.mainship_space_begin_move_core('$ZERO','$ZERO','space',1,1,null,gen_random_uuid());" 2>&1 || true)
            echo "$out" | grep -qi "permission denied" && echo "ok: $r cannot EXECUTE the core writer" || { echo "FAIL: $r executed the core writer -> $out"; exit 1; }
            out=$(psql "$DB_URL" -X -c "set role $r; select public.mainship_space_dock_at_location('$ZERO','$ZERO');" 2>&1 || true)
            echo "$out" | grep -qi "permission denied" && echo "ok: $r cannot EXECUTE the dock primitive" || { echo "FAIL: $r executed the dock primitive -> $out"; exit 1; }
          done
          out=$(psql "$DB_URL" -X -c "set role anon; select public.command_main_ship_space_move_to_location('$ZERO', gen_random_uuid());" 2>&1 || true)
          echo "$out" | grep -qi "permission denied" && echo "ok: anon cannot EXECUTE the public wrapper" || { echo "FAIL: anon executed the public wrapper -> $out"; exit 1; }

      - name: Functional fixture matrix (origins / success / rejection / docking+arrival-revalidation / leak / coherence / Stop)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn-hub1a-realchain-fixtures.sql

      - name: Real concurrent-session race — Stop vs arrival-processor on a due location route (settled once)
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn-hub1a-realchain-stop-race.sh

      # NON-REGRESSION NOTE: the existing per-slice proof scripts (osn3-s2..osn4 / dock0 perm) are NOT
      # re-executed here. They embed ERA-SPECIFIC live-state expectations — e.g. osn3-s2-realchain-perm.sql
      # asserts mainship_send_enabled=false (the 0056-era default), which conflicts with the current live
      # value (true, activated 2026-06-21 and mirrored by these fixtures) — and the DOCK-0 perm pins an EXACT
      # client-RPC allowlist (as OSN-4 had to update for its Stop wrapper). Re-running them over a later chain
      # is therefore unsound. Their inputs (migrations ≤0066 + their own scripts) are UNCHANGED by this branch,
      # so they remain green on their own osn3-**/worldhub* branches. Engine-internal service_role-only
      # non-regression IS proven here: scripts/osn-hub1a-realchain-perm.sql §2 asserts begin_move / resolve_origin
      # / dock / processor / lock / validate / stop are all still service_role-only over the 0001..0067 chain.

      - name: Restore simulated dark config (always)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -c "update game_config set value='true'  where key='mainship_send_enabled';" || true
            psql "$DB_URL" -X -c "update game_config set value='false' where key='mainship_space_movement_enabled';" || true
          fi
