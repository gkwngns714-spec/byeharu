name: PORT-ENTRY-1-VERIFY — verifier disposable proof (no production)

# Proves the PORT-ENTRY-1 production verifier WITHOUT any production access:
#   1. DB-free self-test (read-only SQL safety; markers; prosrc-derivation; pinned-CA/verify-full conn template);
#   2. a disposable local Supabase (chain 0001..0072) that runs the verifier in `local` mode: it PASSES on the
#      expected PORT-ENTRY-1 catalog and FAILS CLOSED for wrong body/hash, wrong ACL, missing SECURITY DEFINER,
#      wrong search_path, migration head beyond 0072, and coordinate flag enabled.
# No `environment:` on any job — none can read production secrets.

on:
  push:
    branches:
      - 'port-entry-1-**'
      - 'port-entry-verify-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: port-entry-1-verify-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/port-entry-1-production-verify.sh selftest

  disposable-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies migrations 0001..0072)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: Verifier pass + fail-closed matrix on the disposable stack
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/port-entry-1-verify-proof.sh
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
