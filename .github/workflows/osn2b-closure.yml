name: OSN-2b closure (strict)

# Focused, on-demand closure gate. Every step is BLOCKING (no continue-on-error):
#   1. npm ci     — reproducible install
#   2. npm run lint — FULL-REPO ESLint (eslint .), no continue-on-error
#   3. tsc -b     — whole-project typecheck
#   4. vite build — whole-project production build
# (The OSN-2b resolver unit test was retired with the legacy movement client — 4c-client.)
# This is an on-demand gate; it does not change the repo-wide push CI policy.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  closure:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Strict lint (full repo, no continue-on-error)
        run: npm run lint
      - name: Typecheck (tsc -b)
        run: npx tsc -b
      - name: Production build (vite build)
        run: npx vite build
