name: OSN-2b closure (strict)

# Focused, on-demand closure gate for OSN-2b. Every step is BLOCKING (no continue-on-error):
#   1. npm ci             — reproducible install (incl. tracked, exactly-pinned @playwright/test)
#   2. npm run lint       — FULL-REPO ESLint (eslint .), no continue-on-error. Green after the
#                           dedicated lint-fix of the two prior Date.now()-during-render errors
#                           (dashboard/MainShipPanel.tsx, map/MainShipMarker.tsx).
#   3. tsc -b             — whole-project typecheck
#   4. vite build         — whole-project production build
#   5. resolver unit test — npm run verify:osn:resolver
# This is an on-demand gate; it does not change the repo-wide push CI policy.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  closure:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Strict lint (full repo, no continue-on-error)
        run: npm run lint
      - name: Typecheck (tsc -b)
        run: npx tsc -b
      - name: Production build (vite build)
        run: npx vite build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Resolver unit test
        run: npm run verify:osn:resolver
