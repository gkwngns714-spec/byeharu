name: PHASE 9 — dock-services UI + regression (no production)

# Frontend proof for the Phase-9 docked-port surface, no production access:
#   1. typecheck/build the whole app (regression — Phase-9 changes must not break OSN/expedition compile);
#   2. rendered UI proof: drive the REAL <DockServicesPanel> (and the existing OSN PortNav panel) via the
#      tests/harness Vite server — ok[8] docked shows port+services, ok[9] non-docked shows nothing;
#   3. OSN pure unit-spec regression (ok[11]) — the existing osn readiness/command/resolver specs stay green.

on:
  push:
    branches:
      - 'phase9-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase9-dock-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Typecheck + build (regression — whole app incl. OSN/expedition)
        run: npm run build
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Rendered UI proof — dock-services + OSN PortNav panels (ok[8], ok[9])
        run: npx playwright test --config playwright.osnui.config.ts
      - name: OSN/map pure unit-spec regression (ok[11])
        run: |
          npm run verify:osn:port
          npm run verify:osn:resolver
