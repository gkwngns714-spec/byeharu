name: Verify — OSN S6C coordinate command (unit)

# Runner for the pure OSN-3 S6C-origin unit tests, 4A-POST trimmed to the LIVE survivors of the
# per-ship client deletion: the framework-free grid/gesture helpers (spaceMoveCommand.spec.ts) and
# the hook-free coordinate target marker the fleet-go reuses (spaceMoveTarget.spec.ts). Node-side
# Playwright unit tests — NO page/browser interaction, NO DB, NO secrets, NO live verifier. It exists
# because the dev machine's local toolchain is unreliable (OneDrive node_modules corruption), so
# these must run in CI. Runs on its OWN path-scoped pull requests, and is workflow_dispatch-able
# afterward. It is deliberately NOT a gate on every unrelated push, and it touches no
# production/deploy/Environment state.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/features/map/spaceMoveCommand.ts'
      - 'src/features/map/SpaceMoveTarget.tsx'
      - 'tests/spaceMoveCommand.spec.ts'
      - 'tests/spaceMoveTarget.spec.ts'
      - '.github/workflows/verify-osn-s6c.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run OSN S6C coordinate-command unit tests
        run: npm run verify:osn:s6c
