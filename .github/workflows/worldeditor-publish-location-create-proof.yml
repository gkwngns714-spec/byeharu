name: WORLD-EDITOR PUBLISH-LOCATION-CREATE — last-gap CREATE command disposable proof (no production)

# Proves migration 0252 (worldeditor_publish_location_create) on a THROWAWAY local Supabase — NEVER prod:
#   * `supabase start` applies the FULL migration chain incl. 0252. 0252's own in-migration self-assert
#     runs here against real Postgres (0243 spine + snapshot columns present, command SECURITY DEFINER
#     + authenticated-only, no client write grant on locations with SELECT intact, get_world_map
#     intact, 0239 lockdown intact) — any regression ABORTS `supabase start` red.
#   * a self-rolling-back SQL proof then drives the CREATE command end to end against the running
#     disposable DB: owner create APPLIED into an existing zone across all 12 fields (audit row with
#     after_snapshot and a NULL before_snapshot); non-owner REJECTED (not_authorized, no insert);
#     anon REJECTED (not_authenticated); request_id idempotent (one insert, one audit row, identical
#     replay); bad fields REJECTED server-side (validation_failed + details; a bad ENUM a TYPED
#     detail, never a raw check_violation); a missing / non-uuid / nonexistent zone_id a TYPED
#     validation_failed {invalid_zone} (never a raw not-null/FK violation); a (zone_id,name)
#     collision a typed conflict/duplicate_name via unique(zone_id,name); pirate-zone lockdown
#     intact; the world READ (get_world_map + locations SELECT) intact.
# Read-only proof: self-rolling-back (begin;…rollback;), flips NO committed flag, keeps NO world row.
# NO `environment:` on any job ⇒ none can read production secrets. Modeled on
# worldeditor-publish-location-update-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-worldeditor-publish-location-create**'

permissions:
  contents: read

concurrency:
  group: worldeditor-publish-location-create-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0252 + its self-assert)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: WORLD-EDITOR PUBLISH-LOCATION-CREATE real-chain proof (owner create / rejections / idempotent / validation / invalid-zone / conflict / read-intact)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldeditor-publish-location-create-proof.sql 2>&1)"
          echo "$out"
          for marker in \
            PUBLISH_LOC_CREATE_PASS_OWNER_CREATES \
            PUBLISH_LOC_CREATE_PASS_NONOWNER_REJECTED \
            PUBLISH_LOC_CREATE_PASS_ANON_REJECTED \
            PUBLISH_LOC_CREATE_PASS_IDEMPOTENT \
            PUBLISH_LOC_CREATE_PASS_VALIDATION_REJECTED \
            PUBLISH_LOC_CREATE_PASS_INVALID_ZONE_REJECTED \
            PUBLISH_LOC_CREATE_PASS_CONFLICT \
            PUBLISH_LOC_CREATE_PASS_AUDIT_SNAPSHOT \
            PUBLISH_LOC_CREATE_PASS_ZONE_LOCKDOWN_INTACT \
            PUBLISH_LOC_CREATE_PASS_GET_WORLD_MAP_INTACT \
            'WORLD-EDITOR PUBLISH-LOCATION-CREATE PROOF PASSED'; do
            echo "$out" | grep -q "$marker" || { echo "MISSING PASS MARKER: $marker"; exit 1; }
          done
          echo 'ALL PUBLISH-LOCATION-CREATE PASS MARKERS PRESENT'
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
