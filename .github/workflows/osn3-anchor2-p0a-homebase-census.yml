name: OSN-ANCHOR-2 P0-A — production home-base census (READ-ONLY)

# Manually-dispatched, production-Environment-gated, STRICTLY READ-ONLY count-only census of home-base
# backfill ambiguity. Reuses the established pinned-CA / sslmode=verify-full / session-pooler read-only
# connection pattern. Never deploys, never runs a migration, never writes/DDL/grants, never changes a flag,
# never creates a fixture, never touches space_anchors. The census runs inside one
# BEGIN TRANSACTION ISOLATION LEVEL REPEATABLE READ READ ONLY snapshot and emits only aggregate counts.
#
# Trigger: workflow_dispatch ONLY (no push / pull_request / schedule / workflow_run). The production job is
# pinned to main and gated by the protected `production` Environment, so a human must approve before any
# production connection. Not attached to migration deployment.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: anchor2-p0a-homebase-census
  cancel-in-progress: false

jobs:
  static_safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Static safety self-test (NO database, no secrets)
        run: bash scripts/osn3-anchor2-p0a-homebase-census.sh selftest

  production_census:
    needs: static_safety
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Production read-only home-base census (count-only)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash scripts/osn3-anchor2-p0a-homebase-census.sh production
