name: Verify — OSN resolver (unit)

# On-demand runner for the pure resolveMainShipMarker unit test (OSN-1 + OSN-2b). This is a
# node-side Playwright unit test (no page/browser, no DB, no secrets). It exists because the dev
# machine's local toolchain is unreliable (OneDrive node_modules corruption), so the resolver tests
# must be runnable in CI. Dispatch-only — it is NOT a gate on every push (a broader unit-test CI
# strategy remains a separate future decision); it just lets us actually execute these tests.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # @playwright/test is NOT a tracked dependency — install it ad-hoc with --no-save so
      # package-lock.json stays in sync and other workflows' `npm ci` keep working (mirrors browser.yml).
      - name: Install Playwright (ad-hoc, no lockfile change)
        run: |
          npm install --no-save @playwright/test@latest
          npx playwright install --with-deps chromium
      - name: Run OSN resolver unit test
        run: npm run verify:osn:resolver
