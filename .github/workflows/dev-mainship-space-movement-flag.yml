name: Dev — mainship space-movement flag

# DEV/ADMIN manual-test control: set ONLY game_config.mainship_space_movement_enabled to an explicit
# value. Dispatch-only. It does NOT auto-restore — flip it true to test, then dispatch again with false
# when done (the flag must end false). Sibling of "Dev — mainship flag" (which owns mainship_send_enabled
# and is unaffected). Touches no other config, ships, fleets, movements, data, migrations, or UI. Uses the
# service-role secret in the repo (not available locally). Only repo-write users can dispatch. Shares the
# live-DB concurrency group to avoid races. NOTE: during OSN-3 S6A this is NOT dispatched against
# production — the live mainship_space_movement_enabled flag stays false.

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: 'Set mainship_space_movement_enabled to true (test) or false (restore)'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: live-db-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  set-flag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set mainship_space_movement_enabled
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/dev-mainship-space-movement-flag.mjs --enabled ${{ inputs.enabled }}
