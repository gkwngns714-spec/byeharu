name: Runtime owners (read-only diagnostic)

# Read-only: prints who owns the current runtime rows (test vs real player). Deletes nothing.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  whoami:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Identify runtime row owners
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/whoami-runtime.mjs
