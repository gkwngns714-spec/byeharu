name: Post-reveal verify (PRODUCTION — gated, read-only)

# Manually-dispatched, production-Environment-gated, STRICTLY READ-ONLY verification that production matches
# the approved POST-REVEAL state (the three canonical starter ports are ACTIVE/public, flags unchanged). It is
# the independent counterpart to the dark-state catalog verifier (which asserts the ports HIDDEN and is left
# untouched). It NEVER writes, never calls reveal_starter_ports(), never changes a flag. Connection = the
# proven pinned-CA + sslmode=verify-full + Management-API session-pooler path; all reads inside one
# BEGIN ... REPEATABLE READ READ ONLY snapshot that ROLLBACKs. workflow_dispatch ONLY; runs only from main; a
# DB-free static self-test gates the production job.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postreveal-verify-production
  cancel-in-progress: false

jobs:
  static_safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: DB-free static safety self-test (no secrets, no DB)
        run: bash scripts/postreveal-verify.sh selftest

  postreveal_verify:
    needs: static_safety
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Refuse any ref other than main
        run: |
          set +x
          [ "$GITHUB_REF" = "refs/heads/main" ] || { echo "BLOCKED: runs only from refs/heads/main (got $GITHUB_REF)"; exit 1; }
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Read-only post-reveal production verification (pinned-CA verify-full session pooler)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +x
          bash scripts/postreveal-verify.sh production
