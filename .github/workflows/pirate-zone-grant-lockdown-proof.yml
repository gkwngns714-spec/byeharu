name: PIRATE-ZONE GRANT LOCKDOWN — reproducible containment disposable proof (no production)

# Proves migration 0239 (pirate_zone_grant_lockdown) on a THROWAWAY local Supabase — NEVER production:
#   * `supabase start` applies the FULL migration chain incl. 0233 (the prototype grant) THEN 0239
#     (the revoke). 0239's own in-migration self-assert runs here against real Postgres — if the
#     authoring RPCs were ever executable by authenticated/anon, `supabase start` would ABORT red.
#   * a tiny read-only SQL proof then re-confirms, against the running disposable DB, that
#     authenticated + anon CANNOT execute pirate_zone_create/pirate_zone_delete and that service_role
#     STILL can (owner tooling / the dark dev ZoneEditor path survives).
# Read-only proof: performs NO writes, flips NO committed flag. No `environment:` on any job, so none
# can read production secrets. Modeled on port-shop-proof.yml / danger-combat-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-pirate-zone-grant-lockdown**'

permissions:
  contents: read

concurrency:
  group: pirate-zone-grant-lockdown-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0233 grant + 0239 revoke)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: PIRATE-ZONE GRANT LOCKDOWN real-chain proof (authenticated/anon revoked; service_role kept)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/pirate-zone-grant-lockdown-proof.sql 2>&1)"
          echo "$out"
          echo "$out" | grep -q 'PIRATE-ZONE GRANT LOCKDOWN PROOF PASSED' \
            || { echo 'PROOF DID NOT REACH THE PASS MARKER'; exit 1; }
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
