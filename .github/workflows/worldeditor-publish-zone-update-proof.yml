name: WORLD-EDITOR PUBLISH-ZONE-UPDATE — zone EDIT command disposable proof (no production)

# Proves migration 0266 (worldeditor_publish_zone_update) on a THROWAWAY local Supabase — NEVER prod:
#   * `supabase start` applies the FULL migration chain incl. 0266. 0266's own in-migration self-assert
#     runs here against real Postgres (0243 spine + snapshot columns present, zone_update SECURITY
#     DEFINER + search_path='' + authenticated-only, body writes danger_zones only / never pirate_zone_*,
#     create+unpublish twins intact, no client write grant on danger_zones with SELECT intact,
#     get_danger_zones intact, 0239 pirate-zone lockdown intact incl. the service_role grant) — any
#     regression ABORTS `supabase start` red.
#   * a self-rolling-back SQL proof then drives the zone EDIT command end to end against the running
#     disposable DB: owner EDIT APPLIED onto the SAME danger_zones.id (geometry re-materialized, name +
#     attach written, source preserved, visible through get_danger_zones once lit — txn-local flip,
#     rolled back); non-owner REJECTED (not_authorized, no write); anon REJECTED (not_authenticated + no
#     execute grant); request_id idempotent (one apply, one audit row, identical replay); a stale
#     `expected` REJECTED via optimistic concurrency (stale_revision + source_changed for BOTH a name
#     drift AND a geometry drift — ST_Equals compare); a self-intersecting new ring REJECTED at the
#     authoritative ST_IsValid gate (typed invalid_geometry); a seeded source='circle' zone PROTECTED
#     (typed validation_failed {protected_zone}); audit row carries BOTH before+after snapshots; a
#     vanished target not_found/source_missing + a non-uuid target invalid_request; the 0239 pirate-zone
#     lockdown intact and danger_zones the ONLY write path.
# Read-only proof: self-rolling-back (begin;…rollback;), flips NO committed flag, keeps NO world row.
# NO `environment:` on any job ⇒ none can read production secrets. Modeled on
# worldeditor-publish-zone-create-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-worldeditor-zone-update**'

permissions:
  contents: read

concurrency:
  group: worldeditor-publish-zone-update-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0266 + its self-assert)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: WORLD-EDITOR PUBLISH-ZONE-UPDATE real-chain proof (edit-applied / rejections / idempotent / stale / invalid-geometry / protected / not-found / lockdown-intact)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldeditor-publish-zone-update-proof.sql 2>&1)"
          echo "$out"
          for marker in \
            PUBLISH_ZONE_UPD_PASS_OWNER_UPDATES \
            PUBLISH_ZONE_UPD_PASS_NONOWNER_REJECTED \
            PUBLISH_ZONE_UPD_PASS_ANON_REJECTED \
            PUBLISH_ZONE_UPD_PASS_IDEMPOTENT \
            PUBLISH_ZONE_UPD_PASS_STALE_REVISION_REJECTED \
            PUBLISH_ZONE_UPD_PASS_INVALID_GEOMETRY_REJECTED \
            PUBLISH_ZONE_UPD_PASS_PROTECTED_ZONE \
            PUBLISH_ZONE_UPD_PASS_AUDIT_BEFORE_AFTER \
            PUBLISH_ZONE_UPD_PASS_NOT_FOUND \
            PUBLISH_ZONE_UPD_PASS_PIRATE_ZONE_LOCKDOWN_INTACT \
            'WORLD-EDITOR PUBLISH-ZONE-UPDATE PROOF PASSED'; do
            echo "$out" | grep -q "$marker" || { echo "MISSING PASS MARKER: $marker"; exit 1; }
          done
          echo 'ALL PUBLISH-ZONE-UPDATE PASS MARKERS PRESENT'
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
