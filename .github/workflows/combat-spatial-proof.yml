name: COMBAT-SPATIAL — 0234 spatial-combat disposable proof (no production)

# Runs the COMBAT-SPATIAL disposable proof on a throwaway local Supabase — NEVER production:
#   1. DB-free selftest: the harness is well-formed, self-rolling-back (opens a txn, toggles every
#      dark capability flag ONLY inside it, ends in ROLLBACK with NO COMMIT), obeys the sole-writer
#      law (group_sortie_members/combat_units are never hand-written — provisioning + the encounter/
#      tick go through the real RPCs and engine functions only), and pins every property assert in
#      assert-form;
#   2. a disposable local Supabase (the full chain incl. 0234) running the real-chain scenario:
#      commission 3 ships → craft/fit 2 real weapons → form a team, designate a command ship → send
#      the hunt → settle arrival (spawns the spatial encounter) → tick 1 (HOLD/KITE/CLOSE movement,
#      player fire, pirate hp falls) → tick 2 (the pirate has closed in and fires back — the S1
#      aggro-tier screening holds: only an escort ever takes the hit, never the command ship).
# HOST DECISION (recorded, the decks-proof.yml precedent): this is a NEW, standalone workflow rather
# than a block appended to fleetgo-proof or team-command-proof — both of those pairs are CONTENDED by
# concurrently in-flight slices repointing them. The proof flips NO committed flag; no `environment:`
# on any job — none can read production secrets.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-combat-s3**'

permissions:
  contents: read

concurrency:
  group: combat-spatial-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/combat-spatial-proof.sh selftest

  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full migration chain incl. 0234)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: COMBAT-SPATIAL real-chain scenario
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/combat-spatial-proof.sh local
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
