name: WORLD-HUB-1A — real-migration-chain proof (disposable Supabase)

# Authoritative proof for the WORLD-HUB-1A additive city/port + home-port domain foundation (migration 0065).
# Boots a DISPOSABLE local Supabase stack via the repository-supported CLI, applying the ACTUAL migration
# chain 0001..0065 — real tables, CHECKs, indexes, RLS, grants, FKs, and the real roles
# anon/authenticated/service_role. NOT a stub; NEVER the shared/live DB. Proves the additive, server-only,
# EMPTY contract: locations.physical_role (closed CHECK, all existing rows 'unclassified'), the private
# location_services capability table (CASCADE, unique-per-kind, client-denied), and player_home_port (PK
# one-per-player, FK location RESTRICT / player CASCADE, owner-read only, no player write), plus that
# locations stays client SELECT-only and get_world_map() is intact. Seeds nothing; asserts the new tables
# empty and no location reclassified; touches NO flags; creates/consumes NO anchors; changes NO OSN behavior.
# Runs on push to the worldhub branch(es). No production deploy, no live verifier, no prod DB.

on:
  push:
    branches:
      - 'worldhub*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start disposable local Supabase (applies migrations 0001..0065)
        run: supabase start

      - name: Export local stack connection env (keys masked)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^(API_URL|DB_URL)=' /tmp/sbenv || true

      - name: WORLD-HUB-1A real-chain proof (schema / RLS / grants / FK / CHECK / no-seed)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldhub1a-realchain-proof.sql
