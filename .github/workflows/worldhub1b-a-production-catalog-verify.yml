name: WORLD-HUB-1B-A — production catalog verify (READ-ONLY)

# Manually-dispatched, production-Environment-gated, STRICTLY READ-ONLY verification that the deployed
# WORLD-HUB-1B-A catalog (migration 0066) matches the approved migration EXACTLY. Reuses the established
# pinned-CA / sslmode=verify-full / session-pooler read-only connection pattern. Never deploys, never runs a
# migration / DDL / DML / fixture / cleanup / write-capable RPC, never changes a flag. All reads run inside one
# BEGIN TRANSACTION ISOLATION LEVEL REPEATABLE READ READ ONLY snapshot and emit only PASS/FAIL booleans + counts.
#
# Trigger: workflow_dispatch ONLY (no push / pull_request / schedule / workflow_run). The production job is
# pinned to main and gated by the protected `production` Environment, so a human must approve before any
# production connection. Not attached to migration deployment. Does NOT touch the stale osn-enablement-preflight.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worldhub1b-a-production-catalog-verify
  cancel-in-progress: false

jobs:
  static_safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Static safety self-test (NO database, no secrets)
        run: bash scripts/worldhub1b-a-production-catalog-verify.sh selftest

  production_verify:
    needs: static_safety
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Ensure read-only PostgreSQL client present (no DB action)
        run: |
          command -v psql >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y postgresql-client; }
          psql --version
      - name: Production read-only catalog verification (PASS/FAIL booleans + counts only)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          VERIFY_SUMMARY_FILE: ${{ runner.temp }}/worldhub1b-a-verify-summary.md
        run: bash scripts/worldhub1b-a-production-catalog-verify.sh production
      - name: Upload verification summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: worldhub1b-a-production-catalog-verify
          path: ${{ runner.temp }}/worldhub1b-a-verify-summary.md
          if-no-files-found: warn
