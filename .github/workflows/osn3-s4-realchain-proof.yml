name: OSN-3 S4 — real-migration-chain proof (disposable Supabase)

# Authoritative/gating S4 proof for the coordinate-arrival processor process_mainship_space_arrivals().
# Boots a DISPOSABLE local Supabase stack via the CLI, applying the ACTUAL chain 0001..0058 — real
# tables/CHECKs/indexes/RLS/grants/triggers/pg_cron and the real roles anon/authenticated/service_role.
# NOT a stub; NEVER the shared/live DB. Proves the processor's permission/RPC boundary + cron job, the
# settle-once/idempotency/not-yet-due/flag-off positive matrix, the full contradiction no-mutation matrix,
# real concurrent-session settle-once + skip-locked behavior, REST/RPC denial, and restores the simulated
# activated config (send=true, space_movement=false, cap=86400). Runs on push to the OSN-3 branch(es).

on:
  push:
    branches:
      - 'osn3-**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start disposable local Supabase (applies migrations 0001..0058)
        run: supabase start

      - name: Export local stack connection env (keys masked)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^(API_URL|DB_URL)=' /tmp/sbenv || true

      - name: Processor permission/boundary + cron proof (real chain)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn3-s4-realchain-perm.sql

      - name: Runtime SET ROLE EXECUTE denial + service_role success (processor)
        run: |
          set -a; . /tmp/sbenv; set +a
          for r in anon authenticated; do
            out=$(psql "$DB_URL" -X -c "set role $r; select public.process_mainship_space_arrivals();" 2>&1 || true)
            echo "$out" | grep -qi "permission denied" && echo "ok: $r cannot EXECUTE the processor" || { echo "FAIL: $r executed processor -> $out"; exit 1; }
          done
          out=$(psql "$DB_URL" -X -c "set role service_role; select public.process_mainship_space_arrivals() as settled;" 2>&1)
          echo "$out" | grep -qi "permission denied" && { echo "FAIL: service_role denied -> $out"; exit 1; } || true
          echo "$out" | grep -qiE "settled|[0-9]" && echo "ok: service_role can EXECUTE (returned a settled count)" || { echo "FAIL: service_role -> $out"; exit 1; }

      - name: Settlement fixture matrix (positive + idempotency + contradiction no-mutation)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/osn3-s4-realchain-fixtures.sql

      - name: Dynamic concurrency proof (real concurrent sessions)
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn3-s4-realchain-concurrency.sh

      - name: Local REST/RPC permission proof (anon + authenticated JWT)
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn3-s4-realchain-rest.sh

      - name: Restore simulated activated config + cleanup fixtures (always)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -c "update game_config set value='true'  where key='mainship_send_enabled';" || true
            psql "$DB_URL" -X -c "update game_config set value='false' where key='mainship_space_movement_enabled';" || true
            psql "$DB_URL" -X -c "update game_config set value='86400' where key='max_coordinate_travel_seconds';" || true
            psql "$DB_URL" -X -c "delete from auth.users where email like 'osn3s4fix.%@example.com' or email like 'osn3s4lock.%@example.com' or email like 'osn3s4rest.%@example.com';" || true
          fi

      - name: Assert flags/cap + no fixtures remain (always)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -v ON_ERROR_STOP=1 -X -c "do \$\$ declare a text; b text; c text; n int;
            begin
              select value::text into a from game_config where key='mainship_send_enabled';
              select value::text into b from game_config where key='mainship_space_movement_enabled';
              select value::text into c from game_config where key='max_coordinate_travel_seconds';
              if a is distinct from 'true'  then raise exception 'send flag=%', a; end if;
              if b is distinct from 'false' then raise exception 'space flag=%', b; end if;
              if c is distinct from '86400' then raise exception 'cap=%', c; end if;
              select count(*) into n from auth.users where email like 'osn3s4%@example.com'; if n<>0 then raise exception '% fixture users remain', n; end if;
              raise notice 'post-run ok: send=true space=false cap=86400 no-fixture-users';
            end \$\$;"
          fi

      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
