name: OSN enablement preflight — disposable proof (no production)

# Proves the OSN-ENABLEMENT-1A post-reveal preflight WITHOUT any production access:
#   1. DB-free self-test: the preflight SQL is read-only / never RAISEs / emits the current-state sentinels;
#      and the frontend coordinate-travel suppression gate works.
#   2. a disposable local Supabase (chain 0001..0068) matrix that runs the ACTUAL preflight SQL: post-reveal
#      baseline passes, and each fail-closed case (hidden/wrong-count port, flag deviation, OSN ACL/boundary
#      break, coordinate-travel exposure) fails. The post-reveal state is created by a DIRECT status update on
#      the throwaway stack — reveal_starter_ports() is NEVER called.
#   3. a scope guard confirming no migration / frontend / gameplay / home-port / flag-default change.
# No `environment:` on any job — none can read production secrets.

on:
  push:
    branches:
      - 'osn-enablement-1a-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osn-enablement-1a-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/osn-enablement-preflight-proof.sh selftest

  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Confirm OSN-ENABLEMENT-1A is preflight/proof/doc-only
        run: |
          set +x
          git fetch origin main 2>/dev/null || true
          base="$(git merge-base origin/main HEAD || echo origin/main)"
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files vs main:"; echo "$changed"
          if echo "$changed" | grep -qE '^supabase/migrations/|^src/|(^|/)package(-lock)?\.json$'; then
            echo "FAIL: OSN-ENABLEMENT-1A must not change migrations, frontend source, or packages"; exit 1; fi
          echo "ok[6] scope guard: no migration / frontend / gameplay / home-port / flag-default change — preflight/proof/doc only"

  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies migrations 0001..0068)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: Post-reveal preflight matrix ok[1]..ok[5] on the disposable stack
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/osn-enablement-preflight-proof.sh local
      - name: Assert the disposable stack ends at the dark baseline (3 ports hidden; OSN flag false)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -v ON_ERROR_STOP=1 -c "do \$\$ declare n int; begin
              select count(*) into n from public.locations where id in ('b1a00001-0066-4a00-8a00-000000000001','b1a00002-0066-4a00-8a00-000000000002','b1a00003-0066-4a00-8a00-000000000003') and status<>'hidden';
              if n<>0 then raise exception '% starter port(s) left non-hidden', n; end if;
              if (select value from public.game_config where key='mainship_space_movement_enabled') is distinct from 'false'::jsonb then raise exception 'OSN flag not false'; end if;
              raise notice 'post-run ok: 3 ports hidden; OSN flag false';
            end \$\$;"
          fi
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
