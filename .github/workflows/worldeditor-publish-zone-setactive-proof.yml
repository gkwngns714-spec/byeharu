name: WORLD-EDITOR PUBLISH-ZONE-SETACTIVE — zone reactivate disposable proof (no production)

# Proves migration 0268 (worldeditor_zone_setactive) on a THROWAWAY local Supabase — NEVER prod:
#   * `supabase start` applies the FULL migration chain incl. 0268. 0268's own in-migration self-assert
#     runs here against real Postgres (0243 spine + snapshot columns present, zone_set_active SECURITY
#     DEFINER + search_path='' + authenticated-only, body writes danger_zones only, the zone_create/
#     zone_unpublish/zone_update twins intact, no client write grant on danger_zones with SELECT intact,
#     get_danger_zones intact, 0239 pirate-zone lockdown intact incl. the service_role grant) — any
#     regression ABORTS `supabase start` red.
#   * a self-rolling-back SQL proof then drives the WHOLE lifecycle end to end against the running
#     disposable DB: owner CREATE a marked canary (0254) → owner UNPUBLISH it (0255 zone_unpublish STILL
#     WORKS → inactive, gone from get_danger_zones); reactivate rejections — non-owner + anon
#     (not_authorized / not_authenticated + no execute grant), malformed payload (invalid_request), vanished
#     target (not_found/source_missing), drifted draft (stale_revision/source_changed), seeded circle zone
#     (validation_failed/protected_zone) — all with zero side effects; owner REACTIVATE → the SAME row flips
#     to active with its boundary BYTE-IDENTICAL and id/kind/source/attach/creator/created_at preserved,
#     reappears in get_danger_zones AND interception; exactly ONE zone_set_active audit row (before inactive
#     / after active); an idempotent replay adds no second audit and does NOT re-mutate; a NEW request on
#     the active zone is validation_failed/already_active; existing zones untouched; danger_zones + 0239
#     lockdowns intact.
# Read-only proof: self-rolling-back (begin;…rollback;), flips NO committed flag, keeps NO world row.
# NO `environment:` on any job ⇒ none can read production secrets. Modeled on
# worldeditor-publish-zone-unpublish-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-worldeditor-zone-reactivate**'

permissions:
  contents: read

concurrency:
  group: worldeditor-publish-zone-setactive-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0268 + its self-assert)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: WORLD-EDITOR PUBLISH-ZONE-SETACTIVE real-chain proof (create / unpublish-works / rejections / malformed / not-found+stale / protected / reactivate / audit / idempotent / already-active / lockdown-intact)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldeditor-publish-zone-setactive-proof.sql 2>&1)"
          echo "$out"
          for marker in \
            PUBLISH_ZONE_REACT_PASS_OWNER_CREATES_CANARY \
            PUBLISH_ZONE_REACT_PASS_UNPUBLISH_WORKS \
            PUBLISH_ZONE_REACT_PASS_NONOWNER_REJECTED \
            PUBLISH_ZONE_REACT_PASS_ANON_REJECTED \
            PUBLISH_ZONE_REACT_PASS_MALFORMED_REJECTED \
            PUBLISH_ZONE_REACT_PASS_NOT_FOUND_AND_STALE \
            PUBLISH_ZONE_REACT_PASS_PROTECTED_ZONE_REJECTED \
            PUBLISH_ZONE_REACT_PASS_OWNER_REACTIVATES \
            PUBLISH_ZONE_REACT_PASS_AUDIT \
            PUBLISH_ZONE_REACT_PASS_IDEMPOTENT \
            PUBLISH_ZONE_REACT_PASS_ALREADY_ACTIVE \
            PUBLISH_ZONE_REACT_PASS_EXISTING_UNCHANGED_AND_LOCKDOWN_INTACT \
            'WORLD-EDITOR PUBLISH-ZONE-SETACTIVE PROOF PASSED'; do
            echo "$out" | grep -q "$marker" || { echo "MISSING PASS MARKER: $marker"; exit 1; }
          done
          echo 'ALL PUBLISH-ZONE-SETACTIVE PASS MARKERS PRESENT'
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
