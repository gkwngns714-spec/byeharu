name: PORT-LAUNCH-2B — reveal-precondition + onboarding proof (disposable Supabase)

# Disposable full real-migration-chain (0001..0068) proof of the starter-port reveal preconditions and the
# REAL first-player onboarding path, WITHOUT touching production. Boots a throwaway local Supabase via the
# CLI (real tables/CHECKs/RLS/grants/triggers/pg_cron + the real anon/authenticated/service_role roles),
# mirrors the LIVE flag state on the disposable stack (mainship_send_enabled=true) so the real
# send_main_ship_expedition path runs, keeps the OSN movement flag dark (false), then proves: dark baseline →
# reveal semantics → HOME→Haven Reach legacy send→arrival→legacy_present→anchored origin→readiness
# (anchored/osn_available=false, only the other visible ports) → non-combat/non-reward → full revert. The
# fixtures REVERT the world to fully hidden (no net world/player change, no fixtures left). reveal_starter_ports()
# is invoked ONLY inside the disposable proof. NEVER the shared/live DB.

on:
  push:
    branches:
      - 'port-launch-2b-**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start disposable local Supabase (applies migrations 0001..0068)
        run: supabase start

      - name: Export local stack connection env (keys masked)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^(API_URL|DB_URL)=' /tmp/sbenv || true

      - name: Mirror the LIVE flag state on the disposable stack (send=true; OSN movement stays dark=false)
        run: |
          set -a; . /tmp/sbenv; set +a
          # mainship_send_enabled is seeded false by migration 0050 (production activates it operationally);
          # the real onboarding send path requires it true. This writes ONLY the disposable stack's runtime
          # config — never production, never the repository/migration default. The OSN movement flag is left
          # at its dark default and asserted false by the proof + the post-run invariant.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -X -c "update game_config set value='true'  where key='mainship_send_enabled';"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -X -c "update game_config set value='false' where key='mainship_space_movement_enabled';"

      - name: Reveal-precondition + REAL onboarding proof (disposable; reverts the world)
        run: |
          set -a; . /tmp/sbenv; set +a
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/portlaunch2b-realchain-fixtures.sql

      - name: Assert dark invariants unchanged (OSN flag false + ports hidden; no fixtures; no net world/player state)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -v ON_ERROR_STOP=1 -X -c "do \$\$ declare b text; n int;
            begin
              select value::text into b from game_config where key='mainship_space_movement_enabled';
              if b is distinct from 'false' then raise exception 'space-movement flag=%', b; end if;
              select count(*) into n from public.locations where id in ('b1a00001-0066-4a00-8a00-000000000001','b1a00002-0066-4a00-8a00-000000000002','b1a00003-0066-4a00-8a00-000000000003') and status<>'hidden';
              if n<>0 then raise exception '% starter port(s) left non-hidden', n; end if;
              select count(*) into n from auth.users where email like 'pl2bfix.%@example.com';
              if n<>0 then raise exception '% fixture users remain', n; end if;
              if (select count(*) from public.player_home_port) <> 0 then raise exception 'player_home_port row leaked'; end if;
              raise notice 'post-run ok: OSN flag false; 3 ports hidden; no fixtures; no home-port';
            end \$\$;"
          fi

      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
