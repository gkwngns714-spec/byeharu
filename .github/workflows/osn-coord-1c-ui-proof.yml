name: OSN-COORD-ENABLE-1C — coordinate runtime-capability UI proof (no production)

# Frontend proof for the OSN-COORD-ENABLE-1C runtime coordinate-capability integration. No production access:
#   1. typecheck/build the whole app (regression — the GalaxyMap/readiness changes must not break the bundle);
#   2. rendered UI proof: drive the REAL <GalaxyMap> via the tests/harness Vite server — the empty-space
#      coordinate command surface mounts ONLY when the server capability (coordinate_travel_available) is true
#      AND the ship is eligible; it stays hidden when capability is false, on fetch failure, when ineligible,
#      and when the movement domain is disabled. The dock-services UI proof rides along (regression);
#   3. OSN pure unit-spec regression — the readiness parser + the new runtime coordinate-gate predicate.
# No `environment:` on any job — none can read production secrets.

on:
  push:
    branches:
      - 'osn-coord-enable-1c-**'
      - 'osn-coord-1c-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osn-coord-1c-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Typecheck + build (regression — whole app incl. OSN/map)
        run: npm run build
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Rendered UI proof — GalaxyMap coordinate capability (+ dock-services regression)
        run: npx playwright test --config playwright.osnui.config.ts
      - name: OSN/map pure unit-spec regression (readiness parser + coordinate-gate predicate)
        run: |
          npm run verify:osn:port
          npm run verify:osn:resolver
