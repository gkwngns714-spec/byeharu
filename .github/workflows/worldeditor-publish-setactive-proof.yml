name: WORLD-EDITOR PUBLISH-SETACTIVE — unpublish/restore commands disposable proof (no production)

# Proves migration 0250 (worldeditor_publish_setactive) on a THROWAWAY local Supabase — NEVER prod:
#   * `supabase start` applies the FULL migration chain incl. 0250. 0250's own in-migration self-assert
#     runs here against real Postgres (0243 spine + snapshot columns present, BOTH set_active commands
#     SECURITY DEFINER + authenticated-only, no client write grant on exploration_sites/mining_fields,
#     0239 lockdown intact) — any regression ABORTS `supabase start` red.
#   * a self-rolling-back SQL proof then drives BOTH unpublish/restore commands end to end against the
#     running disposable DB: owner disable APPLIED on both twins (is_active→false, NOTHING else
#     changed, audit row with BOTH before_snapshot AND after_snapshot); owner re-enable brings the
#     identical rows back (no hard delete anywhere); non-owner REJECTED (not_authorized, no write);
#     anon REJECTED (not_authenticated); request_id idempotent (one apply, one audit row, identical
#     replay even with a flipped direction); a STALE `expected` REJECTED (optimistic concurrency →
#     stale_revision + source_changed naming the drifted field, nothing written); a vanished target a
#     typed not_found/source_missing; pirate-zone lockdown intact.
# Read-only proof: self-rolling-back (begin;…rollback;), flips NO committed flag, keeps NO world row.
# NO `environment:` on any job ⇒ none can read production secrets. Modeled on
# worldeditor-publish-exploration-update-proof.yml.

on:
  workflow_dispatch:
  push:
    branches:
      - 'autopilot/**'
      - 'slice-worldeditor-publish-setactive**'

permissions:
  contents: read

concurrency:
  group: worldeditor-publish-setactive-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies the full chain incl. 0250 + its self-assert)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: WORLD-EDITOR PUBLISH-SETACTIVE real-chain proof (disable/restore / rejections / idempotent / stale / not_found)
        run: |
          set -a; . /tmp/sbenv; set +a
          : "${DB_URL:?DB_URL (disposable stack) required}"
          out="$(psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/worldeditor-publish-setactive-proof.sql 2>&1)"
          echo "$out"
          for marker in \
            PUBLISH_SETACTIVE_PASS_OWNER_DISABLES \
            PUBLISH_SETACTIVE_PASS_OWNER_REENABLES \
            PUBLISH_SETACTIVE_PASS_NONOWNER_REJECTED \
            PUBLISH_SETACTIVE_PASS_ANON_REJECTED \
            PUBLISH_SETACTIVE_PASS_IDEMPOTENT \
            PUBLISH_SETACTIVE_PASS_STALE_REVISION_REJECTED \
            PUBLISH_SETACTIVE_PASS_NOT_FOUND \
            PUBLISH_SETACTIVE_PASS_AUDIT_BEFORE_AFTER \
            PUBLISH_SETACTIVE_PASS_ZONE_LOCKDOWN_INTACT \
            'WORLD-EDITOR PUBLISH-SETACTIVE PROOF PASSED'; do
            echo "$out" | grep -q "$marker" || { echo "MISSING PASS MARKER: $marker"; exit 1; }
          done
          echo 'ALL PUBLISH-SETACTIVE PASS MARKERS PRESENT'
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
