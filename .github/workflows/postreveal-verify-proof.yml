name: Post-reveal verify — disposable proof (no production)

# Proves the PORT-LAUNCH-2E post-reveal verifier WITHOUT any production access:
#   1. DB-free static self-test (read-only SQL allowlist, no reveal call, conn template);
#   2. a disposable local Supabase (chain 0001..0068) verification matrix — the expected post-reveal active
#      state passes, and every fail-closed case (hidden canonical port, wrong active count, flag change,
#      map omission, unexpected map exposure) fails. The disposable post-reveal state is created by a DIRECT
#      status update on the throwaway stack — reveal_starter_ports() is NEVER called;
#   3. a scope guard confirming no migration / frontend / flag-default / onboarding / OSN change.
# No `environment:` on any job — none can read production secrets.

on:
  push:
    branches:
      - 'port-launch-2e-**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postreveal-verify-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/postreveal-verify.sh selftest

  scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Confirm PORT-LAUNCH-2E is verifier-only (no migration / frontend / product change)
        run: |
          set +x
          git fetch origin main 2>/dev/null || true
          base="$(git merge-base origin/main HEAD || echo origin/main)"
          changed="$(git diff --name-only "$base" HEAD)"
          echo "changed files vs main:"; echo "$changed"
          if echo "$changed" | grep -qE '^supabase/migrations/|^src/|(^|/)package(-lock)?\.json$'; then
            echo "FAIL: PORT-LAUNCH-2E must not change migrations, frontend source, or packages"; exit 1; fi
          echo "ok[6] scope guard: no migration / frontend / flag-default / onboarding / OSN change — verifier-only"

  disposable-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start disposable local Supabase (applies migrations 0001..0068)
        run: supabase start
      - name: Export disposable DB_URL (no secrets)
        run: |
          supabase status -o env | tee /tmp/sbenv >/dev/null
          grep -E '^DB_URL=' /tmp/sbenv || true
      - name: Verification matrix (post-reveal pass + fail-closed negatives) on the disposable stack
        run: |
          set -a; . /tmp/sbenv; set +a
          bash scripts/postreveal-verify.sh local
      - name: Assert the disposable stack ends at the dark baseline (3 ports hidden; OSN flag false)
        if: always()
        run: |
          set -a; . /tmp/sbenv 2>/dev/null || true; set +a
          if [ -n "${DB_URL:-}" ]; then
            psql "$DB_URL" -X -v ON_ERROR_STOP=1 -c "do \$\$ declare n int; begin
              select count(*) into n from public.locations where id in ('b1a00001-0066-4a00-8a00-000000000001','b1a00002-0066-4a00-8a00-000000000002','b1a00003-0066-4a00-8a00-000000000003') and status<>'hidden';
              if n<>0 then raise exception '% starter port(s) left non-hidden', n; end if;
              if (select value from public.game_config where key='mainship_space_movement_enabled') is distinct from 'false'::jsonb then raise exception 'OSN flag not false'; end if;
              raise notice 'post-run ok: 3 ports hidden; OSN flag false';
            end \$\$;"
          fi
      - name: Stop disposable stack (always)
        if: always()
        run: supabase stop --no-backup || true
