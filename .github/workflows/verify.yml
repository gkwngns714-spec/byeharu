name: Verify (integration tests)

# Runs the M2–M5 integration verification against the live Supabase project, in CI,
# so closing a milestone never depends on a local toolchain. Two triggers:
#   · automatically after "Deploy Supabase migrations" succeeds on main
#   · manually (workflow_dispatch) — optionally skipping the M2/M3/M4 regression chain
#
# Requires these REPO SECRETS (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL          your-project URL  (https://<ref>.supabase.co)
#   VITE_SUPABASE_ANON_KEY     anon / publishable key (used by the throwaway player)
#   SUPABASE_SERVICE_ROLE_KEY  service_role secret — drives the locked worldstate_tick()
#                              and dev helper. Server-side only; never shipped to the
#                              frontend (frontend reads only VITE_-prefixed vars).
# Email confirmation must be OFF in Supabase Auth (throwaway signups need a session).

on:
  workflow_dispatch:
    inputs:
      skip_regress:
        description: 'Skip the M2/M3/M4 regression chain (M5 only)'
        type: boolean
        default: false
  workflow_run:
    workflows: ['Deploy Supabase migrations']
    types: [completed]

# Serialize: two verifies racing on the same world-state locations would interfere.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # On the workflow_run trigger, only verify when the deploy actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+: supabase-js 2.108's realtime client needs a native WebSocket
          # (Node 20 throws "detected without native WebSocket support" at createClient).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 4 verification (loot bundle; chains Inventory → M4.5 → M5 → M2/M3/M4)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PHASE4_SKIP_REGRESS: ${{ inputs.skip_regress && '1' || '0' }}
        run: npm run verify:phase4
